version: "3.9"

services:
  queueease-ml:
    build: .
    container_name: queueease_ml_api
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-queueease-dev-key-change-in-prod}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_RELOAD=false
    volumes:
      - ./artifacts:/app/artifacts   # persist trained model across restarts
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
